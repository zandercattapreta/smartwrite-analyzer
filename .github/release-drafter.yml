name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
categories:
  - title: "🚀 Features"
    labels:
      - 'feature'
  - title: "🐞 Bug Fixes"
    labels:
      - 'bug'
  - title: "🧰 Maintenance"
    labels:
      - 'chore'
  - title: "🧪 Tests"
    labels:
      - 'test'
change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"\ntemplate: |
  ## What's Changed
  $CHANGES
  
  **Full Changelog**: https://github.com/$REPO/compare/$FROM...$TO
